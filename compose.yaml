# Docker Compose for Coolify deployment (standalone TTS service)
# Deploy as a separate Coolify resource pointing at the tts-service repo
#
# Deploy ONE of these compose files per Coolify resource:
#   compose.yaml       — Kokoro CPU (default, works on any host)
#   compose.gpu.yaml   — Qwen3-TTS GPU (requires NVIDIA GPU + Container Toolkit)
#
# For hosts with GPU that want both engines, deploy each as a separate
# Coolify resource pointing at the appropriate compose file.

services:
  tts-kokoro:
    build:
      context: .
      dockerfile: docker/cpu/Dockerfile
    restart: unless-stopped
    labels:
      - "app=${APP_NAME:-eloise}"
      - "service=tts-kokoro"
    expose:
      - "8880"
    environment:
      - 'TTS_ENGINE=kokoro'
      - 'USE_GPU=false'
      - 'API_KEYS=${API_KEYS:-}'
      - 'DEBUG_API_KEY=${DEBUG_API_KEY:-}'
      - 'ENABLE_WEB_PLAYER=${ENABLE_WEB_PLAYER:-false}'
      - 'ENABLE_DOCS=${ENABLE_DOCS:-false}'
    volumes:
      - tts_kokoro_models:/app/api/src/models/v1_0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

volumes:
  tts_kokoro_models:
    driver: local
